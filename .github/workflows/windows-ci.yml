name: Windows build and background tests

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install Android workload
        shell: pwsh
        run: dotnet workload install maui-android
      - name: Run audit, Windows tests, and Android build
        shell: pwsh
        run: .\scripts\test.ps1 -SkipAndroidRuntime
